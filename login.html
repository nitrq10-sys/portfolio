<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portföy Girişi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-login {
            background: #667eea;
            color: white;
        }
        .btn-login:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .btn-register {
            background: #f1c40f;
            color: #333;
        }
        .btn-register:hover {
            background: #f0b90b;
            transform: translateY(-2px);
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Portföy</h1>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="ornek@email.com">
        </div>

        <div class="form-group">
            <label for="password">Şifre</label>
            <input type="password" id="password" placeholder="Şifrenizi girin">
        </div>

        <div class="button-group">
            <button class="btn-login" onclick="login()">Giriş</button>
            <button class="btn-register" onclick="register()">Kayıt Ol</button>
        </div>

        <div class="loading" id="loading">Yükleniyor...</div>
        <div class="status" id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "%VITE_FIREBASE_API_KEY%",
            authDomain: "%VITE_FIREBASE_AUTH_DOMAIN%",
            databaseURL: "%VITE_FIREBASE_DATABASE_URL%",
            projectId: "%VITE_FIREBASE_PROJECT_ID%",
            storageBucket: "%VITE_FIREBASE_STORAGE_BUCKET%",
            messagingSenderId: "%VITE_FIREBASE_MESSAGING_SENDER_ID%",
            appId: "%VITE_FIREBASE_APP_ID%",
            measurementId: "%VITE_FIREBASE_MEASUREMENT_ID%"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Zaten giriş yapılmışsa index.html'e yönlendir
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        window.login = function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');
            const loading = document.getElementById('loading');

            if (!email || !password) {
                showStatus('❌ Email ve şifre boş olamaz', 'error');
                return;
            }

            loading.style.display = 'block';
            statusDiv.style.display = 'none';

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    loading.style.display = 'none';
                    showStatus('✅ Giriş başarılı!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                })
                .catch((error) => {
                    loading.style.display = 'none';
                    const errorMsg = error.code === 'auth/user-not-found' ? 'Kullanıcı bulunamadı' :
                                     error.code === 'auth/wrong-password' ? 'Şifre yanlış' :
                                     error.code === 'auth/invalid-email' ? 'Geçersiz email' :
                                     'Giriş başarısız: ' + error.message;
                    showStatus('❌ ' + errorMsg, 'error');
                });
        };

        window.register = function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');
            const loading = document.getElementById('loading');

            if (!email || !password) {
                showStatus('❌ Email ve şifre boş olamaz', 'error');
                return;
            }

            if (password.length < 6) {
                showStatus('❌ Şifre en az 6 karakter olmalı', 'error');
                return;
            }

            loading.style.display = 'block';
            statusDiv.style.display = 'none';

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    loading.style.display = 'none';
                    showStatus('✅ Kayıt başarılı! Yönlendiriliyorsunuz...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                })
                .catch((error) => {
                    loading.style.display = 'none';
                    const errorMsg = error.code === 'auth/email-already-in-use' ? 'Bu email zaten kullanılıyor' :
                                     error.code === 'auth/invalid-email' ? 'Geçersiz email' :
                                     error.code === 'auth/weak-password' ? 'Şifre çok zayıf' :
                                     'Kayıt başarısız: ' + error.message;
                    showStatus('❌ ' + errorMsg, 'error');
                });
        };

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
        }

        // Enter tuşu ile giriş yap
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
