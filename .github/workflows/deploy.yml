name: Deploy Portfolio

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Replace Firebase Config
        run: |
          sed -i "s|%VITE_FIREBASE_API_KEY%|${{ secrets.FIREBASE_API_KEY }}|g" firebase-config.js login.html
          sed -i "s|%VITE_FIREBASE_AUTH_DOMAIN%|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" firebase-config.js login.html
          sed -i "s|%VITE_FIREBASE_DATABASE_URL%|${{ secrets.FIREBASE_DATABASE_URL }}|g" firebase-config.js login.html
          sed -i "s|%VITE_FIREBASE_PROJECT_ID%|${{ secrets.FIREBASE_PROJECT_ID }}|g" firebase-config.js login.html
          sed -i "s|%VITE_FIREBASE_STORAGE_BUCKET%|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" firebase-config.js login.html
          sed -i "s|%VITE_FIREBASE_MESSAGING_SENDER_ID%|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" firebase-config.js login.html
          sed -i "s|%VITE_FIREBASE_APP_ID%|${{ secrets.FIREBASE_APP_ID }}|g" firebase-config.js login.html
          sed -i "s|%VITE_FIREBASE_MEASUREMENT_ID%|${{ secrets.FIREBASE_MEASUREMENT_ID }}|g" firebase-config.js login.html
      
      # Buraya deploy adımlarını ekle (GitHub Pages, Firebase Hosting vs.)
